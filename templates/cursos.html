{% extends "layout.html" %}
{% block container %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cursos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
<div class="max-w-6xl mx-auto mt-10 bg-white shadow-xl rounded-2xl p-8">

    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-700">
            📚 Lista de Cursos
        </h2>

        <a href="{{ url_for('cursos.agregar') }}"
           class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-lg shadow-md">
            + Agregar Curso
        </a>
    </div>

    <table class="min-w-full bg-white border border-gray-200 rounded-lg overflow-hidden">

        <thead class="bg-gray-100">
            <tr>
                <th class="py-3 px-4 text-left">ID</th>
                <th class="py-3 px-4 text-left">Nombre</th>
                <th class="py-3 px-4 text-left">Descripción</th>
                <th class="py-3 px-4 text-left">Maestro</th>
                <th class="py-3 px-4 text-center">Acciones</th>
            </tr>
        </thead>

        <tbody>

        {% for curso in cursos %}

            <tr class="border-t hover:bg-gray-50">

                <td class="py-3 px-4">
                    {{ curso.id }}
                </td>

                <td class="py-3 px-4">
                    {{ curso.nombre }}
                </td>

                <td class="py-3 px-4">
                    {{ curso.descripcion }}
                </td>

                <td class="py-3 px-4">
                    {{ curso.maestro.matricula }}
                </td>

                <td class="py-3 px-4 text-center space-x-2">

                    <a href="{{ url_for('cursos.editar', id=curso.id) }}"
                               class="inline-block bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-semibold shadow-md transition">
                                Editar
                            </a>

                            <a href="{{ url_for('cursos.detalles', id=curso.id) }}"
                               class="inline-block bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-xs font-semibold shadow-md transition">
                               Detalles
                            </a>

                            <a href="{{ url_for('cursos.eliminar', id=curso.id) }}"
                               class="inline-block bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-semibold shadow-md transition">
                                Eliminar
                            </a>

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>
</body>
</html>
{% endblock %}
