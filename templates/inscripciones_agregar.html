{% extends "layout.html" %}
{% block container %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nueva Inscripcion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <div class="max-w-xl mx-auto mt-16 bg-white p-8 shadow rounded">

        <h2 class="text-xl font-bold mb-6">
            ➕ Nueva Inscripción
        </h2>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-4">

                <label>Alumno</label>

                <select name="alumno_id" class="w-full border p-2 rounded">

                    {% for alumno in alumnos %}

                    <option value="{{ alumno.id }}">
                        {{ alumno.nombre }} {{ alumno.apellidos }}
                    </option>

                    {% endfor %}

                </select>

            </div>


            <div class="mb-4">

                <label>Curso</label>

                <select name="curso_id" class="w-full border p-2 rounded">

                    {% for curso in cursos %}

                    <option value="{{ curso.id }}">
                        {{ curso.nombre }}
                    </option>

                    {% endfor %}

                </select>

            </div>


            <button class="bg-green-500 text-white px-4 py-2 rounded">
                Guardar
            </button>

            <a href="{{ url_for('inscripciones.index') }}"
                    class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-lg shadow-md">

                    Cancelar

                </a>

        </form>

    </div>
</body>

</html>
{% endblock %}
