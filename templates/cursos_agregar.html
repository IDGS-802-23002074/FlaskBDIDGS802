{% extends "layout.html" %}
{% block container %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cursos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <div class="max-w-xl mx-auto mt-16 bg-white shadow-xl rounded-2xl p-8">

        <h2 class="text-2xl font-bold text-gray-700 mb-6">
            ➕ Agregar Curso
        </h2>

        <form method="POST">
            {{ form.hidden_tag() }}

            <div class="mb-4">
                <label class="block text-gray-600">Nombre del Curso</label>

                <input type="text" name="nombre" class="w-full border rounded-lg px-3 py-2"
                    >
            </div>


            <div class="mb-4">
                <label class="block text-gray-600">Descripción</label>

                <textarea name="descripcion" class="w-full border rounded-lg px-3 py-2"
                    placeholder="Descripción del curso"></textarea>
            </div>


            <div class="mb-6">
                <label class="block text-gray-600">Maestro</label>

                {{ form.maestro_id(class="w-full border rounded-lg px-3 py-2") }}
            </div>


            <div class="flex justify-between">

                <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg shadow-md">

                    Guardar Curso

                </button>

                <a href="{{ url_for('cursos.index') }}"
                    class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-lg shadow-md">

                    Cancelar

                </a>

            </div>

        </form>

    </div>
</body>

</html>
{% endblock %}
